version: 2
updates:
  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Docker base images in harness Dockerfiles
  - package-ecosystem: docker
    directory: /harnesses/pi
    schedule:
      interval: weekly
    commit-message:
      prefix: docker

  - package-ecosystem: docker
    directory: /harnesses/opencode
    schedule:
      interval: weekly
    commit-message:
      prefix: docker